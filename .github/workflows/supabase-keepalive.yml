name: Supabase Keep-Alive
on:
  schedule:
    - cron: '0 12 */3 * *'  # every 3 days at noon UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://bpnomdhoemfqwjbvzlap.supabase.co/auth/v1/health")
          echo "Status: $code"
          [[ "$code" == "200" ]] || exit 1
